name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      # Log what changed (optional). Deploy always pushes backend + restarts PM2 so the
      # DigitalOcean droplet never stays on stale server.js while the UI updates.
      - name: List changed files
        run: |
          echo "Changed files:"
          git diff --name-only HEAD~1 HEAD || true

      # Always build & deploy frontend on main — conditional deploys skipped UI updates when
      # change detection missed paths or users needed the latest bundle/cache-bust.
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy frontend
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            frontend/dist/ \
            root@165.245.137.192:/var/www/spectrum-outfitters/frontend/dist/

      - name: Deploy backend
        run: |
          rsync -avz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='database/shop_tasks.db' \
            --exclude='database/shop_tasks.db-wal' \
            --exclude='database/shop_tasks.db-shm' \
            --exclude='uploads/' \
            --exclude='backups/' \
            --exclude='.env' \
            backend/ \
            root@165.245.137.192:/var/www/spectrum-outfitters/backend/

      - name: Install deps, migrate, restart PM2 (DigitalOcean)
        run: |
          ssh root@165.245.137.192 "cd /var/www/spectrum-outfitters/backend && npm install && node database/startup.js && pm2 restart spectrum-outfitters"

      # Raffle app: /opt/spectrum-raffle/raffle-platform (PM2 spectrum-raffle, port 3001). One-time server
      # setup: /etc/spectrum-raffle.env + nginx (see raffle-platform/scripts/SETUP_SERVER.md).
      - name: Deploy raffle platform (rsync)
        run: |
          ssh root@165.245.137.192 "mkdir -p /opt/spectrum-raffle/raffle-platform"
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env.local' \
            raffle-platform/ \
            root@165.245.137.192:/opt/spectrum-raffle/raffle-platform/

      - name: Raffle — install, build, restart PM2
        run: |
          ssh root@165.245.137.192 bash -s <<'ENDSSH'
          set -euo pipefail
          mkdir -p /var/log/spectrum-raffle
          # Next.js 16+ requires Node >= 20.9; droplet may still be on 18 for legacy apps
          NODE_MAJOR=$(node -p "parseInt(process.versions.node.split('.')[0],10)" 2>/dev/null || echo 0)
          if [ "$NODE_MAJOR" -lt 20 ]; then
            echo "Raffle: installing Node.js 20.x (current: $(node -v 2>/dev/null || echo none))"
            export DEBIAN_FRONTEND=noninteractive
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs
          fi
          node -v
          cd /opt/spectrum-raffle/raffle-platform
          if [ -f /etc/spectrum-raffle.env ]; then
            cp /etc/spectrum-raffle.env .env.local
            echo "Raffle: synced .env.local from /etc/spectrum-raffle.env"
          else
            echo "Raffle: /etc/spectrum-raffle.env not found yet — create it for APPS_SCRIPT_URL (setup page will guide you)."
          fi
          npm ci --include=dev
          npm run build
          if pm2 describe spectrum-raffle >/dev/null 2>&1; then
            pm2 restart spectrum-raffle
          else
            pm2 start ecosystem.config.cjs --env production
          fi
          pm2 save
          ENDSSH

      # Without this, raffle.* hits default_server → static 404. Installs proxy to :3001 once.
      - name: Raffle — enable nginx site (first time or broken symlink)
        run: |
          ssh root@165.245.137.192 bash -s <<'ENDSSH'
          set -euo pipefail
          SRC=/opt/spectrum-raffle/raffle-platform/scripts/raffle.nginx
          AV=/etc/nginx/sites-available/spectrum-raffle
          EN=/etc/nginx/sites-enabled/spectrum-raffle
          if [ ! -f "$SRC" ]; then echo "Missing $SRC"; exit 1; fi
          if [ -L "$EN" ] && [ ! -e "$EN" ]; then rm -f "$EN"; fi
          if [ -L "$EN" ] && [ -e "$EN" ]; then
            echo "Raffle nginx site already enabled: $EN"
          else
            echo "Installing raffle nginx reverse proxy (HTTP → 127.0.0.1:3001)..."
            cp "$SRC" "$AV"
            ln -sf "$AV" "$EN"
          fi
          nginx -t
          ENDSSH

      - name: Reload nginx
        run: |
          ssh root@165.245.137.192 "touch /var/www/spectrum-outfitters/frontend/dist/index.html 2>/dev/null || true; systemctl reload nginx"
