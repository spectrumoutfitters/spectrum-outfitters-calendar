<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var t = localStorage.getItem('spectrum-ui-theme');
          if (t === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Spectrum Outfitters - Employee Task Management System" />
    <title>Spectrum Outfitters - Task Management</title>
    <!-- Favicon (browsers) -->
    <link rel="icon" type="image/png" href="/spectrum-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <!-- iPhone Add to Home Screen: use 180x180 for best result -->
    <link rel="apple-touch-icon" sizes="180x180" href="/spectrum-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/spectrum-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/spectrum-icon.png" />
    <!-- Fallback for older iOS -->
    <link rel="apple-touch-icon" href="/spectrum-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
